
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Privacy Policy – TPC Match Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.6;
      color: #333;
    }
    h1, h2 {
      color: #2C256B;
    }
    .lang-switch {
      margin-bottom: 24px;
      text-align: center;
    }
    .lang-switch button {
      margin: 4px;
      padding: 6px 10px;
      border: 1px solid #2C256B;
      background: white;
      color: #2C256B;
      cursor: pointer;
      border-radius: 4px;
      font-weight: bold;
    }
    .lang-switch button.active {
      background: #2C256B;
      color: white;
    }
    .lang {
      display: none;
    }
    .lang.active {
      display: block;
    }
  </style>
</head>

<body>

<div class="lang-switch">
  <button onclick="setLang('en')" id="btn-en">English</button>
  <button onclick="setLang('pt')" id="btn-pt">Português</button>
  <button onclick="setLang('es')" id="btn-es">Español</button>
  <button onclick="setLang('fr')" id="btn-fr">Français</button>
  <button onclick="setLang('it')" id="btn-it">Italiano</button>
  <button onclick="setLang('de')" id="btn-de">Deutsch</button>
</div>
